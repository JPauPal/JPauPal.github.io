<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPauPal's Hub</title>
    
    <style>
        /* General Page Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e; /* Dark background */
            color: #ededed;
            text-align: center;
            margin-top: 80px;
        }

        /* The Animated Button Link */
        .ui-btn {
            display: inline-block;
            text-decoration: none; /* Removes the standard link underline */
            color: white;
            background-color: #0f3460;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 8px; /* Rounded corners */
            font-weight: bold;
            font-size: 1.1rem;
            
            /* The Animation Magic */
            transition: all 0.3s ease-in-out; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* What happens when you hover over the button */
        .ui-btn:hover {
            background-color: #e94560; /* Changes color */
            transform: translateY(-5px) scale(1.05); /* Floats up and grows slightly */
            box-shadow: 0 10px 25px rgba(233, 69, 96, 0.5); /* Glow effect */
        }
    </style>
</head>
<body>

    <h1>Welcome to My Corner of the Web</h1>
    <p>Check out my projects and hobbies below.</p>

    <!-- Clickable Links disguised as animated buttons -->
    <div style="margin-top: 40px;">
        <a href="https://github.com/JPauPal" class="ui-btn" target="_blank">GitHub Profile</a>
        <a href="#aquascaping" class="ui-btn">Aquascaping Gallery</a>
        <a href="#figures" class="ui-btn">Figure Building Log</a>
    </div>

</body>
</html>
